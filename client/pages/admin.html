<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayurveda Admin Dashboard</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="ambient"></div>

  <header class="admin-header">
    <h1>Ayurveda Journey Dashboard</h1>
    <a class="back-link" href="chatbot.html">Back to Website</a>
  </header>

  <main class="admin-shell">
    <section class="control-panel">
      <div class="control-row">
        <label for="adminToken">Admin Token</label>
        <input type="password" id="adminToken" placeholder="Optional token" />
      </div>
      <div class="control-row">
        <label for="resultLimit">Show Latest</label>
        <select id="resultLimit">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <button id="loadBtn" class="load-btn">Load Requests</button>
      <div id="loadStatus" class="load-status" aria-live="polite"></div>
    </section>

    <section class="stats-grid" id="statsGrid">
      <article class="stat-card">
        <span>Total</span>
        <strong id="statTotal">0</strong>
      </article>
      <article class="stat-card">
        <span>Detox</span>
        <strong id="statDetox">0</strong>
      </article>
      <article class="stat-card">
        <span>Stress</span>
        <strong id="statStress">0</strong>
      </article>
      <article class="stat-card">
        <span>Weight</span>
        <strong id="statWeight">0</strong>
      </article>
      <article class="stat-card">
        <span>Immunity</span>
        <strong id="statImmunity">0</strong>
      </article>
    </section>

    <section class="table-panel">
      <div class="table-head">
        <h2>Journey Submissions</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Track</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Concern</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" class="empty-state">No data loaded yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../js/admin.js"></script>
</body>
</html>
